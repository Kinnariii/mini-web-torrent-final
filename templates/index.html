<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniTorrent</title>
  <style>
    :root {
      --bg-main: #0b1121;
      --bg-card: #151b2d;
      --bg-input: #1a233a;
      --border-color: #2a3449;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --accent-blue: #3b82f6;
      --accent-cyan: #06b6d4;
      --gradient-primary: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      --gradient-hover: linear-gradient(135deg, #0891b2, #2563eb);
      --danger: #ef4444;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-card);
    }
    
    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--gradient-primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: white;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-cyan);
      letter-spacing: 0.5px;
    }

    .settings-btn {
      background: none;
      border: none;
      color: #f59e0b; /* yellow-500 */
      font-size: 20px;
      cursor: pointer;
    }

    /* Main Layout */
    main {
      flex: 1;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .card-title::after {
      content: '';
      display: block;
      flex: 1;
      height: 2px;
      background: var(--accent-cyan);
      margin-top: 2px;
      opacity: 0.8;
      border-radius: 2px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .tab-btn:hover {
      background: var(--bg-input);
      color: var(--text-main);
    }

    .tab-btn.active {
      background: var(--gradient-primary);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Forms */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .input-field {
      width: 100%;
      padding: 12px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-main);
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--accent-blue);
    }

    /* Toggle Buttons */
    .toggle-group {
      display: flex;
      gap: 10px;
    }

    .toggle-btn {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .toggle-btn.active {
      background: var(--bg-input);
      color: var(--accent-cyan);
      border-color: var(--accent-cyan);
    }

    /* Drag & Drop */
    .drop-zone {
      border: 2px dashed var(--accent-cyan);
      border-radius: 8px;
      padding: 3rem 2rem;
      text-align: center;
      background: rgba(6, 182, 212, 0.05);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1.5rem;
    }

    .drop-zone:hover, .drop-zone.dragover {
      background: rgba(6, 182, 212, 0.1);
      border-color: var(--accent-blue);
    }

    .drop-icon {
      font-size: 40px;
      color: #fcd34d; /* yellow folder icon color */
      margin-bottom: 10px;
    }

    .drop-text {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .drop-subtext {
      font-size: 12px;
      color: var(--text-muted);
    }

    #file-input {
      display: none;
    }

    /* Primary Button */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--gradient-primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
    }

    .btn-primary:hover {
      background: var(--gradient-hover);
      transform: translateY(-1px);
    }
    
    .btn-danger {
      background: var(--danger);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    
    .btn-danger:hover {
      background: #dc2626;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1rem;
    }

    .stat-box {
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 5px;
      text-align: center;
    }

    .stat-val {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-cyan);
      margin-bottom: 4px;
    }

    .stat-lbl {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .last-updated {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
    }

    /* Peer List */
    .peer-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border-color);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .peer-item:last-child {
      border-bottom: none;
    }

    .peer-ip {
      color: var(--text-main);
      font-weight: 500;
    }

    .peer-meta {
      color: var(--text-muted);
      font-size: 11px;
    }
    
    .peer-healthy {
      color: var(--success);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      padding: 20px 0;
      font-style: italic;
    }

    /* Progress bar */
    .progress-wrap { margin-top: 15px; }
    .progress-label { font-size: 13px; color: var(--text-main); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .progress-bar-bg { background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 8px; height: 12px; overflow: hidden; }
    .progress-bar-fill {
      height: 100%; background: var(--gradient-primary);
      transition: width 0.4s ease;
      width: 0%;
    }
    
    #upload-result, #download-result {
      margin-top: 15px;
      font-size: 14px;
      padding: 10px;
      border-radius: 6px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-color);
      display: none;
    }
    
    .success-text { color: var(--success); }
    .error-text { color: var(--danger); }
    
    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid var(--border-color);
    }
    .result-row:last-child { border-bottom: none; }
    
    #delete-section {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed var(--border-color);
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <div class="logo-icon">🔗</div>
      <h1>MiniTorrent</h1>
    </div>
    <button class="settings-btn">⚙️</button>
  </header>

  <main>
    <!-- Left Column: Actions -->
    <div class="left-col">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('upload')">📤 Upload & Share</button>
        <button class="tab-btn" onclick="switchTab('download')">📥 Download Files</button>
      </div>

      <!-- Upload Tab -->
      <div id="tab-upload" class="tab-content active card">
        <h2 class="card-title">Share a File or Folder</h2>
        
        <div class="form-group toggle-group">
          <button class="toggle-btn active" id="btn-single-file" onclick="setMode('file')">Single File</button>
          <button class="toggle-btn" id="btn-folder" onclick="setMode('folder')">Folder</button>
        </div>

        <div class="form-group">
          <label class="form-label">Display Name (Optional)</label>
          <input type="text" class="input-field" placeholder="E.g., My Awesome Project v2">
        </div>

        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
          <div class="drop-icon" id="drop-icon">📄</div>
          <div class="drop-text" id="drop-text">Drag & Drop or Click to Select</div>
          <div class="drop-subtext" id="drop-subtext">Select a single file to share</div>
          <input type="file" id="file-input">
        </div>

        <button class="btn-primary" onclick="uploadFile()" id="upload-btn">Upload & Generate Metainfo</button>
        
        <div id="upload-result"></div>
        
        <div id="delete-section">
          <button class="btn-primary btn-danger" onclick="deleteTorrent()">🗑️ Delete This Torrent</button>
          <div id="delete-result" style="font-size:13px; margin-top:8px; text-align:center;"></div>
        </div>
      </div>

      <!-- Download Tab -->
      <div id="tab-download" class="tab-content card">
        <h2 class="card-title">Download a File</h2>
        
        <div class="form-group">
          <label class="form-label">Metainfo Path</label>
          <input type="text" id="metainfo-path" class="input-field" placeholder="e.g. uploads/file.pdf.json">
        </div>
        
        <div class="form-group">
          <label class="form-label">Download Port</label>
          <input type="text" id="dl-port" class="input-field" placeholder="Port (e.g. 6882)" value="6882">
        </div>

        <button class="btn-primary" onclick="startDownload()">Start Download</button>
        
        <div id="download-result"></div>
        <div id="progress-section"></div>
      </div>
    </div>

    <!-- Right Column: Stats -->
    <div class="right-col">
      <div class="card">
        <h2 class="card-title">📡 Network Stats</h2>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-val" id="stat-active">0</div>
            <div class="stat-lbl">Active Peers</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="stat-healthy">0</div>
            <div class="stat-lbl">Healthy</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="stat-torrents">0</div>
            <div class="stat-lbl">Torrents</div>
          </div>
        </div>
        <div class="last-updated" id="refresh-time">Last updated: --:--:--</div>
      </div>

      <div class="card">
        <h2 class="card-title">💻 Active Peers</h2>
        <div id="peers-list">
          <div class="empty-state">No active peers</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // --- UI Logic ---
    let uploadMode = 'file';
    let lastMetainfoPath = null;

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      event.currentTarget.classList.add('active');
      document.getElementById('tab-' + tabId).classList.add('active');
    }

    function setMode(mode) {
      uploadMode = mode;
      const fileInput = document.getElementById('file-input');
      const dropIcon = document.getElementById('drop-icon');
      const dropSubtext = document.getElementById('drop-subtext');
      
      document.getElementById('btn-single-file').classList.toggle('active', mode === 'file');
      document.getElementById('btn-folder').classList.toggle('active', mode === 'folder');
      
      if (mode === 'folder') {
        fileInput.setAttribute('webkitdirectory', '');
        fileInput.setAttribute('directory', '');
        fileInput.setAttribute('multiple', '');
        dropIcon.textContent = '📁';
        dropSubtext.textContent = 'Select a folder to share';
      } else {
        fileInput.removeAttribute('webkitdirectory');
        fileInput.removeAttribute('directory');
        fileInput.removeAttribute('multiple');
        dropIcon.textContent = '📄';
        dropSubtext.textContent = 'Select a single file to share';
      }
      
      // Reset selected files display
      document.getElementById('drop-text').textContent = 'Drag & Drop or Click to Select';
    }

    // Drag and drop handling
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
      dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
    });

    dropZone.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
      const dt = e.dataTransfer;
      const files = dt.files;
      handleFiles(files);
      
      // Attach files to input
      if(files && files.length > 0) {
        fileInput.files = files;
      }
    }

    fileInput.addEventListener('change', function() {
      handleFiles(this.files);
    });

    function handleFiles(files) {
      if (files && files.length > 0) {
        if (files.length === 1) {
          document.getElementById('drop-text').textContent = files[0].name;
        } else {
          document.getElementById('drop-text').textContent = `${files.length} files selected`;
        }
      }
    }

    // --- Core Logic ---
    
    async function uploadFile() {
      const resultDiv = document.getElementById('upload-result');
      const deleteSection = document.getElementById('delete-section');
      const btn = document.getElementById('upload-btn');

      if (!fileInput.files || fileInput.files.length === 0) {
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<span class="error-text">Please select a file or folder first.</span>';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Uploading...';
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '<span style="color:var(--text-main)">Uploading and generating metainfo...</span>';
      deleteSection.style.display = 'none';

      const formData = new FormData();
      for (let i = 0; i < fileInput.files.length; i++) {
        const f = fileInput.files[i];
        formData.append('file', f, f.webkitRelativePath || f.name);
      }

      try {
        const resp = await fetch('/upload', { method: 'POST', body: formData });
        const data = await resp.json();

        if (data.error) {
          resultDiv.innerHTML = `<span class="error-text">Error: ${data.error}</span>`;
        } else {
          lastMetainfoPath = data.metainfo_path;
          resultDiv.innerHTML = `
            <div class="success-text" style="margin-bottom:8px; font-weight:600;">✔ ${data.message}</div>
            <div class="result-row"><span>Target</span><span>${data.file_name}</span></div>
            <div class="result-row"><span>Size</span><span>${Math.round(data.size / 1024)} KB</span></div>
            <div class="result-row"><span>Pieces</span><span>${data.pieces}</span></div>
            <div class="result-row"><span>Metainfo</span><span style="font-size:11px; max-width:60%; overflow:hidden; text-overflow:ellipsis;" title="${data.metainfo_path}">${data.metainfo_path}</span></div>
          `;
          deleteSection.style.display = 'block';
        }
      } catch (e) {
        resultDiv.innerHTML = `<span class="error-text">Request failed: ${e}</span>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Upload & Generate Metainfo';
      }
    }

    async function deleteTorrent() {
      const resultDiv = document.getElementById('delete-result');
      if (!lastMetainfoPath) return;
      if (!confirm(`Delete torrent at ${lastMetainfoPath}? This removes the files from the server.`)) return;

      resultDiv.innerHTML = 'Deleting...';
      try {
        const resp = await fetch('/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ metainfo_path: lastMetainfoPath })
        });
        const data = await resp.json();

        if (data.error) {
          resultDiv.innerHTML = `<span class="error-text">Error: ${data.error}</span>`;
        } else {
          document.getElementById('upload-result').innerHTML = `<span class="success-text">✔ ${data.message}</span>`;
          document.getElementById('delete-section').style.display = 'none';
          lastMetainfoPath = null;
          document.getElementById('drop-text').textContent = 'Drag & Drop or Click to Select';
          fileInput.value = '';
        }
      } catch (e) {
        resultDiv.innerHTML = `<span class="error-text">Request failed: ${e}</span>`;
      }
    }

    async function startDownload() {
      const metainfoPath = document.getElementById('metainfo-path').value.trim();
      const port = document.getElementById('dl-port').value.trim();
      const resultDiv = document.getElementById('download-result');
      const progressSection = document.getElementById('progress-section');

      if (!metainfoPath || !port) {
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<span class="error-text">Please fill in both fields.</span>';
        return;
      }

      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '<span style="color:var(--text-main)">Starting download...</span>';
      progressSection.innerHTML = '';

      try {
        const resp = await fetch('/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ metainfo_path: metainfoPath, port: parseInt(port) })
        });
        const data = await resp.json();

        if (data.error) {
          resultDiv.innerHTML = `<span class="error-text">Error: ${data.error}</span>`;
        } else {
          resultDiv.innerHTML = `<span class="success-text">✔ ${data.message}</span>`;
          startProgressPolling(data.file_name, data.num_pieces);
        }
      } catch (e) {
        resultDiv.innerHTML = `<span class="error-text">Request failed: ${e}</span>`;
      }
    }

    function startProgressPolling(fileName, numPieces) {
      const section = document.getElementById('progress-section');
      section.innerHTML = `
        <div class="progress-wrap">
          <div class="progress-label">
            <span>📦 ${fileName}</span>
            <span id="prog-text">0 / ${numPieces || '?'} pieces</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="prog-bar"></div>
          </div>
        </div>`;

      const interval = setInterval(async () => {
        try {
          const resp = await fetch('/progress');
          const data = await resp.json();

          const pct   = data[fileName]?.percent      ?? 0;
          const done  = data[fileName]?.pieces_done  ?? 0;
          const total = data[fileName]?.total_pieces ?? numPieces ?? 0;

          document.getElementById('prog-bar').style.width = pct + '%';
          document.getElementById('prog-text').textContent = `${done} / ${total} pieces (${pct}%)`;

          if (data[fileName]?.status === 'completed') {
            clearInterval(interval);
            document.getElementById('prog-bar').style.background = 'var(--success)';
            document.getElementById('prog-text').textContent = '✔ Complete!';
            document.getElementById('prog-text').style.color = 'var(--success)';
          }
        } catch (e) { /* silently ignore polling errors */ }
      }, 2000);
    }

    async function refreshStats() {
      try {
        const resp = await fetch('/stats');
        const data = await resp.json();

        const peersDiv    = document.getElementById('peers-list');
        const statActive  = document.getElementById('stat-active');
        const statHealthy = document.getElementById('stat-healthy');
        const statTorrents= document.getElementById('stat-torrents');

        if (data.error) {
          peersDiv.innerHTML  = `<div class="empty-state">Tracker offline</div>`;
          statActive.textContent = statHealthy.textContent = statTorrents.textContent = '0';
          return;
        }

        const summary  = data.summary  || {};
        const torrents = data.torrents || {};

        statActive.textContent   = summary.total_active_peers  ?? 0;
        statHealthy.textContent  = summary.total_healthy_peers ?? 0;
        statTorrents.textContent = summary.total_torrents      ?? 0;

        const files = Object.keys(torrents);
        if (files.length === 0) {
          peersDiv.innerHTML = `<div class="empty-state">No active peers</div>`;
          return;
        }

        let peersHTML = '';
        files.forEach(fname => {
          const shortHash = fname.substring(0, 15) + '...';
          Object.entries(torrents[fname].peers).forEach(([addr, age]) => {
            const isHealthy = age <= 30;
            peersHTML += `
              <div class="peer-item">
                <span class="peer-ip">🖥️ ${addr}</span>
                <span class="peer-meta">
                  ${age}s ago | ${shortHash} ${isHealthy ? '<span class="peer-healthy">✅</span>' : ''}
                </span>
              </div>`;
          });
        });
        peersDiv.innerHTML = peersHTML || `<div class="empty-state">No active peers</div>`;

        document.getElementById('refresh-time').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;

      } catch (e) {
        document.getElementById('peers-list').innerHTML = `<div class="empty-state">Could not reach app server</div>`;
      }
    }

    // Init
    setMode('file');
    refreshStats();
    setInterval(refreshStats, 5000);
  </script>

</body>
</html>
